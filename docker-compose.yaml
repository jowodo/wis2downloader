x-env-file: &default-env
   .env

x-logging: &default-logging
  options:
    max-size: "10M"
    max-file: "2"

x-logging-loki: &loki-logging
  driver: loki
  options:
    loki-url: "http://host.docker.internal/loki/loki/api/v1/push"
    loki-retries: "5"
    mode: "non-blocking"
    max-buffer-size: "16m"
    keep-file: "true"
    max-size: "10m"
    max-file: "3"


services:
  traefik:
    container_name: traefik
    image: traefik:v3.6.6
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=redis-net"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - redis-net
    logging: *default-logging

  loki:
    container_name: loki
    image: grafana/loki:3.6.7
    restart: always
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - loki-data:/loki
      - ./config/loki/loki-config.yml:/etc/loki/loki-config.yml
    networks:
      - redis-net
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=PathPrefix(`/loki`)"
      - "traefik.http.routers.loki.entrypoints=web"
      - "traefik.http.routers.loki.priority=10"
      - "traefik.http.middlewares.loki-strip.stripprefix.prefixes=/loki"
      - "traefik.http.routers.loki.middlewares=loki-strip"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"


  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.10.0
    restart: always
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=10d'
      - '--log.level=warn'
    networks:
      - redis-net
    logging: *loki-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.routers.prometheus.priority=10"
      - "traefik.http.middlewares.prometheus-strip.stripprefix.prefixes=/prometheus"
      - "traefik.http.routers.prometheus.middlewares=prometheus-strip"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    container_name: grafana
    image: grafana/grafana:12.4.1
    restart: always
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_LOG_FILTERS=auth.client.session:error,tsdb.loki:warn,sqlstore.transactions:warn
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus
      - loki
    networks:
      - redis-net
    logging: *loki-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.routers.grafana.priority=10"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # Databases / message queues

  redis:
    container_name: redis
    build:
      context: ./containers/redis/
      dockerfile: Dockerfile
    restart: always
    env_file: *default-env
    command: ["redis-server", "--appendonly", "yes", "--protected-mode", "no", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:${CONTAINER_DATA_PATH}
    networks:
      - redis-net
    logging: *loki-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Task handling
  celery-download-workers:
    restart: always
    build:
      context: .
      dockerfile: ./containers/celery/Dockerfile
    volumes:
      - "${HOST_DATA_PATH}:${CONTAINER_DATA_PATH}"
    env_file: *default-env
    tty: true
    depends_on:
      - redis
      - subscription-manager
    networks:
      - redis-net
    logging: *loki-logging
    command: ["/bin/bash", "-c", "source .venv/bin/activate && task_manager_start worker --pool=threads --concurrency=32 --loglevel=${LOG_LEVEL:-info}"]
    healthcheck:
      test: [ "CMD", "celery", "inspect", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 3


  celery-scheduler-workers:
    restart: always
    build:
      context: .
      dockerfile: ./containers/celery/Dockerfile
    volumes:
      - "${HOST_DATA_PATH}:${CONTAINER_DATA_PATH}"
    env_file: *default-env
    tty: true
    depends_on:
      - redis
      - subscription-manager
    networks:
      - redis-net
    logging: *loki-logging
    command: [ "/bin/bash", "-c", "source .venv/bin/activate && scheduler_start worker --concurrency=4 --loglevel=${LOG_LEVEL:-info}" ]
    healthcheck:
      test: [ "CMD", "celery", "inspect", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 3

  celery-beats:
    restart: always
    build:
      context: .
      dockerfile: ./containers/celery/Dockerfile
    volumes:
      - "${HOST_DATA_PATH}:${CONTAINER_DATA_PATH}"
    env_file: *default-env
    tty: true
    depends_on:
      - redis
      - subscription-manager
    networks:
      - redis-net
    logging: *loki-logging
    command: [ "/bin/bash", "-c", "source .venv/bin/activate && scheduler_start beat --loglevel=${LOG_LEVEL:-info}" ]
    healthcheck:
      test: [ "CMD", "celery", "inspect", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Main application
  subscription-manager:
    container_name: subscription-manager
    restart: always
    build:
      context: .
      dockerfile: ./containers/subscription_manager/Dockerfile
    env_file: *default-env
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5001
    tty: true
    depends_on:
      - redis
    networks:
      - redis-net
    logging: *loki-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wis2api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.wis2api.entrypoints=web"
      - "traefik.http.routers.wis2api.priority=10"
      - "traefik.http.routers.wis2api.service=wis2api"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.wis2api.middlewares=api-strip"
      - "traefik.http.services.wis2api.loadbalancer.server.port=5001"

  wis2downloader-ui:
      build:
        context: .
        dockerfile: ./containers/ui/Dockerfile
      env_file: *default-env
      environment:
        - WIS2DOWNLOADER_SUBSCRIPTION_MANAGER_URL=http://subscription-manager:5001
        - WIS2DOWNLOADER_GRAFANA_URL=${WIS2DOWNLOADER_BASE_URL}/grafana
      depends_on:
        - traefik
        - subscription-manager
      networks:
      - redis-net
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ui.rule=PathPrefix(`/`)"
        - "traefik.http.routers.ui.entrypoints=web"
        - "traefik.http.routers.ui.priority=1"
        - "traefik.http.services.ui.loadbalancer.server.port=8080"

  subscriber-france:
    container_name: subscriber-france
    restart: always
    build:
      context: .
      dockerfile: ./containers/subscriber/Dockerfile
    env_file: *default-env
    environment:
      GLOBAL_BROKER_HOST: globalbroker.meteo.fr
      GLOBAL_BROKER_PORT: 443
      GLOBAL_BROKER_USERNAME: everyone
      GLOBAL_BROKER_PASSWORD: everyone
      MQTT_PROTOCOL: websockets
    depends_on:
      - redis
    networks:
      - redis-net
    logging: *loki-logging
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $REDIS_PASSWORD EXISTS subscriber:health:globalbroker-meteo-fr | grep 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

  subscriber-brazil:
    container_name: subscriber-brazil
    restart: always
    build:
      context: .
      dockerfile: ./containers/subscriber/Dockerfile
    env_file: *default-env
    environment:
      GLOBAL_BROKER_HOST: globalbroker.inmet.gov.br
      GLOBAL_BROKER_PORT: 443
      GLOBAL_BROKER_USERNAME: everyone
      GLOBAL_BROKER_PASSWORD: everyone
      MQTT_PROTOCOL: websockets
    depends_on:
      - redis
    networks:
      - redis-net
    logging: *loki-logging
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $REDIS_PASSWORD EXISTS subscriber:health:globalbroker-inmet-gov-br | grep 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
  redis-data:

networks:
  redis-net:
    driver: bridge
